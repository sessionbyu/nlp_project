# ==============================================
# Docker Compose 配置 - NLP 项目
# ==============================================

services:
  # ==============================================
  # 后端服务：FastAPI NLP 推理接口
  # ==============================================
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    container_name: nlp_backend
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/data
      - ./logs/backend:/app/logs/backend
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-nlp_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-nlp_pass}
      - DB_NAME=${POSTGRES_DB:-nlp_db}
      - MODEL_PATH=/data/models/bert-base-chinese
      - USE_CACHE=true
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs/backend
      - TZ=${TZ}
    healthcheck:
      # 健康检查：使用 Python 发送 HTTP 请求（避免安装 curl）
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # ==============================================
  # 前端服务：Streamlit 交互界面
  # ==============================================
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    container_name: nlp_frontend
    ports:
      - "${FRONTEND_PORT}:8501"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://backend:8000
      - TZ=${TZ}
      - LOG_DIR=/app/logs
    volumes:
      - ./logs/frontend:/app/logs
      - ./frontend:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  # ==============================================
  # Redis 服务：缓存 + 任务队列
  # ==============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: nlp_redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend
    environment:
      - TZ=${TZ}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  # ==============================================
  # PostgreSQL 服务：预测历史记录持久化存储
  # ==============================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: nlp_postgres
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nlp_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nlp_pass}
      - POSTGRES_DB=${POSTGRES_DB:-nlp_db}
      - TZ=${TZ}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nlp_user} -d ${POSTGRES_DB:-nlp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

# ==============================================
# 命名卷（由 Docker 管理，位于 /var/lib/docker/volumes/）
# ==============================================
volumes:
  redis_data:
  postgres_data:

# ==============================================
# 自定义网络（桥接模式，服务间可通过服务名通信）
# ==============================================
networks:
  backend:
    driver: bridge
